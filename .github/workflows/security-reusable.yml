name: Security - reusable scan (callable)

on:
  workflow_call:

permissions:
  contents: write
  issues: write

jobs:
  # ------------------------------------------------------------
  # eslint-security: lightweight OWASP / security pattern scan
  # for JavaScript and TypeScript projects.
  # Uses eslint-plugin-security (no build required) to flag
  # common issues: object injection, non-literal regexp/require,
  # unsafe exec, hardcoded credentials, etc.
  # Skipped automatically when no package.json is present.
  # ------------------------------------------------------------
  eslint-security:
    name: ESLint security scan (JS/TS)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect package.json
        id: detect_node
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect_node.outputs.node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install ESLint and security plugin
        if: steps.detect_node.outputs.node == 'true'
        # Installed locally so version is pinned and does not conflict with
        # the project's own eslint version.
        run: npm install --no-save eslint@9 eslint-plugin-security@3

      - name: Run ESLint security scan
        if: steps.detect_node.outputs.node == 'true'
        run: |
          node_modules/.bin/eslint \
            --plugin security \
            --rule 'security/detect-object-injection: warn' \
            --rule 'security/detect-non-literal-regexp: warn' \
            --rule 'security/detect-non-literal-require: warn' \
            --rule 'security/detect-non-literal-fs-filename: warn' \
            --rule 'security/detect-unsafe-regex: warn' \
            --rule 'security/detect-buffer-noassert: warn' \
            --rule 'security/detect-child-process: warn' \
            --rule 'security/detect-disable-mustache-escape: warn' \
            --rule 'security/detect-eval-with-expression: warn' \
            --rule 'security/detect-no-csrf-before-method-override: warn' \
            --rule 'security/detect-possible-timing-attacks: warn' \
            --rule 'security/detect-pseudoRandomBytes: warn' \
            --format json \
            --output-file eslint-security-report.json \
            "**/*.{js,mjs,cjs,ts,mts,cts}" \
            --ignore-pattern node_modules \
            --ignore-pattern dist \
            --ignore-pattern build \
            --ignore-pattern coverage \
            || true

      - name: Ensure report exists
        if: steps.detect_node.outputs.node != 'true'
        run: echo '[]' > eslint-security-report.json

      - name: Upload ESLint security report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eslint-security-report
          path: eslint-security-report.json
          retention-days: 30

  # ------------------------------------------------------------
  # Gitleaks: detect secrets committed to the repository.
  # Uses the CLI directly (not the action) for full flag control
  # and to avoid the unsupported 'args' action input.
  # ------------------------------------------------------------
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        id: gitleaks
        run: |
          gitleaks detect --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0
          if [ -s gitleaks-report.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo '[]' > gitleaks-report.json
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ------------------------------------------------------------
  # npm audit: dependency vulnerability scan for Node projects.
  # Skipped automatically when no package.json is present.
  # ------------------------------------------------------------
  npm-audit:
    name: npm audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect package.json
        id: detect_node
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect_node.outputs.node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect_node.outputs.node == 'true'
        run: npm ci --no-audit

      - name: Run npm audit
        if: steps.detect_node.outputs.node == 'true'
        run: npm audit --json > npm-audit.json || true

      - name: Ensure report exists
        if: steps.detect_node.outputs.node != 'true'
        run: echo '{}' > npm-audit.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30

  # ------------------------------------------------------------
  # pip-audit: dependency vulnerability scan for Python projects.
  # Uses pip-audit (PyPA / Google) instead of safety because:
  #   - pip-audit is fully free and open source (Apache 2.0)
  #   - Backed by the OSV database and PyPI Advisory DB
  #   - safety v3+ requires a paid API key for full results
  # Skipped automatically when no Python indicators exist.
  # ------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Python project
        id: detect_py
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.detect_py.outputs.python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        if: steps.detect_py.outputs.python == 'true'
        run: python -m pip install --upgrade pip pip-audit

      - name: Install project dependencies
        if: steps.detect_py.outputs.python == 'true'
        # Install the project's own deps so pip-audit audits the full resolved
        # dependency tree (including transitives), not just the declared names.
        # The editable install is best-effort: some projects require build tools
        # not present on the runner. Failure is logged and reported rather than
        # silently swallowed, but does not abort the step — pip-audit will still
        # run against the declared deps installed from requirements.txt.
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install -e . --no-deps 2>&1 | tee pip-editable-install.log || {
              echo "Warning: editable install failed — pip-audit will scan declared deps only."
              echo "See pip-editable-install.log for details."
            }
          fi

      - name: Run pip-audit
        if: steps.detect_py.outputs.python == 'true'
        run: |
          pip-audit --format json --output pip-audit.json || true

      - name: Ensure report exists
        if: steps.detect_py.outputs.python != 'true'
        run: echo '{"dependencies":[]}' > pip-audit.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

  # ------------------------------------------------------------
  # Bandit: static security linter for Python source code.
  # Catches hardcoded credentials, SQL injection, insecure calls,
  # eval usage, and other Python-specific security anti-patterns.
  # Complements CodeQL and pip-audit — pip-audit covers dependency
  # vulnerabilities; Bandit covers insecure code patterns.
  # Skipped automatically when no Python indicators exist.
  # ------------------------------------------------------------
  bandit:
    name: Bandit Python security lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Python project
        id: detect_py
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.detect_py.outputs.python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Bandit
        if: steps.detect_py.outputs.python == 'true'
        run: python -m pip install --upgrade pip "bandit[toml]"

      - name: Run Bandit
        if: steps.detect_py.outputs.python == 'true'
        # Skips B110 (try/except/pass) and B112 (try/except/continue) which are
        # commonly used non-security patterns; scans at medium severity and above.
        run: |
          bandit -r . \
            --skip B110,B112 \
            --severity-level medium \
            --format json \
            --output bandit-report.json \
            --exclude ./.git,./node_modules,./venv,./.venv || true

      - name: Ensure report exists
        if: steps.detect_py.outputs.python != 'true'
        run: echo '{"results":[],"metrics":{}}' > bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ------------------------------------------------------------
  # Aggregate all scanner results, create one issue per finding
  # (deduplicating by title), post a summary issue, and fail
  # the workflow when any findings are present.
  # ------------------------------------------------------------
  create-issues-and-fail:
    name: Report findings and fail
    runs-on: ubuntu-24.04
    needs: [eslint-security, secret-scan, npm-audit, pip-audit, bandit]
    if: always()
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Write step summary
        if: always()
        shell: sh
        run: |
          {
            echo "## Security scan results"
            echo ""
            echo "| Scanner | Status | Findings |"
            echo "|---|---|---|"

            # gitleaks
            if [ -f gitleaks-report.json ]; then
              count=$(jq 'if type=="array" then length else 0 end' gitleaks-report.json 2>/dev/null || echo 0)
              if [ "$count" -gt 0 ]; then status="FAIL"; else status="pass"; fi
              echo "| gitleaks (secrets) | $status | $count |"
            else
              echo "| gitleaks (secrets) | skipped | - |"
            fi

            # npm audit
            if [ -f npm-audit.json ] && jq -e '.vulnerabilities' npm-audit.json >/dev/null 2>&1; then
              count=$(jq '[.vulnerabilities | to_entries[]] | length' npm-audit.json 2>/dev/null || echo 0)
              if [ "$count" -gt 0 ]; then status="FAIL"; else status="pass"; fi
              echo "| npm audit | $status | $count |"
            else
              echo "| npm audit | skipped | - |"
            fi

            # pip-audit
            if [ -f pip-audit.json ] && jq -e '.dependencies' pip-audit.json >/dev/null 2>&1; then
              count=$(jq '[.dependencies[].vulns[]] | length' pip-audit.json 2>/dev/null || echo 0)
              if [ "$count" -gt 0 ]; then status="FAIL"; else status="pass"; fi
              echo "| pip-audit | $status | $count |"
            else
              echo "| pip-audit | skipped | - |"
            fi

            # bandit
            if [ -f bandit-report.json ] && jq -e '.results' bandit-report.json >/dev/null 2>&1; then
              high=$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' bandit-report.json 2>/dev/null || echo 0)
              medium=$(jq '[.results[] | select(.issue_severity=="MEDIUM")] | length' bandit-report.json 2>/dev/null || echo 0)
              count=$((high + medium))
              if [ "$count" -gt 0 ]; then status="FAIL"; else status="pass"; fi
              echo "| Bandit (high: $high, medium: $medium) | $status | $count |"
            else
              echo "| Bandit | skipped | - |"
            fi

            # eslint-security
            if [ -f eslint-security-report.json ] && jq -e 'type == "array"' eslint-security-report.json >/dev/null 2>&1; then
              count=$(jq '[.[].messages[]] | length' eslint-security-report.json 2>/dev/null || echo 0)
              if [ "$count" -gt 0 ]; then status="FAIL"; else status="pass"; fi
              echo "| ESLint security (JS/TS) | $status | $count |"
            else
              echo "| ESLint security (JS/TS) | skipped | - |"
            fi

            echo ""
            echo "_Detailed reports are attached as workflow artifacts (retained 30 days)._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issues from findings and fail if any
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: https://api.github.com/repos/${{ github.repository }}
        shell: sh
        run: |
          set -eu
          token="$GITHUB_TOKEN"
          api="$API_URL"
          count_file=$(mktemp)
          echo 0 > "$count_file"
          urls_file=$(mktemp)
          # Temp file for jq output — avoids piping into while, which would run
          # the loop body in a subshell and make count_file writes invisible here.
          items_file=$(mktemp)

          # Helper: create one issue if title not already open; append url to urls_file
          create_issue() {
            _title="$1"
            _body="$2"
            _labels="$3"
            _existing=$(curl -sf \
              -H "Authorization: token $token" \
              -H "Accept: application/vnd.github+json" \
              "$api/issues?state=open&per_page=100" \
              | jq --arg t "$_title" '[.[] | select(.title==$t)] | length')
            if [ "${_existing:-0}" -eq 0 ]; then
              _resp=$(curl -sf -X POST \
                -H "Authorization: token $token" \
                -H "Accept: application/vnd.github+json" \
                "$api/issues" \
                -d "$(jq -n \
                  --arg title "$_title" \
                  --arg body "$_body" \
                  --argjson labels "$_labels" \
                  '{title:$title,body:$body,labels:$labels}')")
              _url=$(printf '%s' "$_resp" | jq -r '.html_url')
              echo "$_url" >> "$urls_file"
              echo $(($(cat "$count_file") + 1)) > "$count_file"
              echo "Created: $_url"
            else
              echo "Skipped duplicate: $_title"
            fi
          }

          # --- gitleaks ---
          if [ -f gitleaks-report.json ] && [ "$(jq 'length' gitleaks-report.json)" -gt 0 ]; then
            jq -c '.[]' gitleaks-report.json > "$items_file"
            while IFS= read -r item; do
              rule=$(printf '%s' "$item" | jq -r '.RuleID // .rule // "secret"')
              fpath=$(printf '%s' "$item" | jq -r '.File // .path // ""')
              _title="Secret detected: $rule in $fpath"
              _body=$(jq -n --argjson d "$item" '{"source":"gitleaks","details":$d}' | jq -r tostring)
              create_issue "$_title" "$_body" '["security","secrets","gitleaks"]'
            done < "$items_file"
          fi

          # --- npm audit ---
          if [ -f npm-audit.json ] && jq -e '.vulnerabilities | length > 0' npm-audit.json >/dev/null 2>&1; then
            jq -c '.vulnerabilities | to_entries[]' npm-audit.json > "$items_file"
            while IFS= read -r entry; do
              pkg=$(printf '%s' "$entry" | jq -r '.key')
              severity=$(printf '%s' "$entry" | jq -r '.value.severity // "unknown"')
              via=$(printf '%s' "$entry" | jq -r '[.value.via[]? | if type=="string" then . else .title end] | join(", ")')
              _title="npm audit: $pkg ($severity)"
              _body=$(jq -n --arg p "$pkg" --arg s "$severity" --arg v "$via" \
                '{"source":"npm-audit","package":$p,"severity":$s,"via":$v}' | jq -r tostring)
              create_issue "$_title" "$_body" '["security","dependencies","npm-audit"]'
            done < "$items_file"
          fi

          # --- pip-audit ---
          if [ -f pip-audit.json ] && jq -e '.dependencies | map(.vulns | length) | add > 0' pip-audit.json >/dev/null 2>&1; then
            jq -c '.dependencies[] | select(.vulns | length > 0) | . as $dep | .vulns[] | {dep:$dep.name,ver:$dep.version,id:.id,fix:.fix_versions,desc:.description}' pip-audit.json > "$items_file"
            while IFS= read -r vuln; do
              pkg=$(printf '%s' "$vuln" | jq -r '.dep')
              vid=$(printf '%s' "$vuln" | jq -r '.id')
              desc=$(printf '%s' "$vuln" | jq -r '.desc // "no description"')
              _title="pip-audit: $pkg - $vid"
              _body=$(jq -n --argjson d "$vuln" '{"source":"pip-audit","details":$d}' | jq -r tostring)
              create_issue "$_title" "$_body" '["security","dependencies","pip-audit"]'
            done < "$items_file"
          fi

          # --- Bandit ---
          if [ -f bandit-report.json ] && jq -e '.results | length > 0' bandit-report.json >/dev/null 2>&1; then
            jq -c '.results[]' bandit-report.json > "$items_file"
            while IFS= read -r item; do
              test_id=$(printf '%s' "$item" | jq -r '.test_id // "B000"')
              test_name=$(printf '%s' "$item" | jq -r '.test_name // "unknown"')
              severity=$(printf '%s' "$item" | jq -r '.issue_severity // "MEDIUM"')
              fpath=$(printf '%s' "$item" | jq -r '.filename // ""')
              lineno=$(printf '%s' "$item" | jq -r '.line_number // ""')
              _title="Bandit: $test_id $test_name ($severity) in $fpath:$lineno"
              _body=$(jq -n --argjson d "$item" '{"source":"bandit","details":$d}' | jq -r tostring)
              create_issue "$_title" "$_body" '["security","code-scanning","bandit"]'
            done < "$items_file"
          fi

          # --- ESLint security ---
          # ESLint JSON format: array of file results, each with a messages[] array.
          if [ -f eslint-security-report.json ] && jq -e '[.[].messages[]] | length > 0' eslint-security-report.json >/dev/null 2>&1; then
            jq -c '.[] | . as $file | .messages[] | {file:$file.filePath,rule:.ruleId,msg:.message,line:.line,severity:.severity}' eslint-security-report.json > "$items_file"
            while IFS= read -r item; do
              rule=$(printf '%s' "$item" | jq -r '.rule // "eslint-security"')
              fpath=$(printf '%s' "$item" | jq -r '.file // ""')
              lineno=$(printf '%s' "$item" | jq -r '.line // ""')
              _title="ESLint security: $rule in $fpath:$lineno"
              _body=$(jq -n --argjson d "$item" '{"source":"eslint-security","details":$d}' | jq -r tostring)
              create_issue "$_title" "$_body" '["security","code-scanning","eslint-security"]'
            done < "$items_file"
          fi

          # --- Summary and exit ---
          total=$(cat "$count_file")
          echo "Total new issues created: $total"
          if [ "$total" -gt 0 ]; then
            all_urls=$(cat "$urls_file" | tr '\n' ' ')
            summary_body=$(jq -n --argjson n "$total" --arg u "$all_urls" \
              '{"total_findings":$n,"issues":$u}' | jq -r tostring)
            create_issue "Security scan summary: $total new findings" "$summary_body" '["security","scan-summary"]'
            echo "Workflow failing due to $total finding(s)."
            exit 1
          else
            echo "No new findings — all clear."
          fi

      - name: Update security badge in README
        # Rewrites the shields.io security badge line in the calling repo's
        # README.md after each scan run, reflecting the current pass/fail state.
        # The badge placeholder must exist in README.md:
        #   <!-- security-badge -->
        #   ![Security](https://img.shields.io/badge/security-...)
        # If the placeholder is absent the step is a no-op (no commit made).
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        shell: sh
        run: |
          # Determine overall scan outcome from the step summary table written earlier.
          # A "FAIL" in the summary means at least one scanner found issues.
          if grep -q "FAIL" "$GITHUB_STEP_SUMMARY" 2>/dev/null; then
            label="failing"
            color="critical"
          else
            label="passing"
            color="brightgreen"
          fi

          BADGE="[![Security scan](https://img.shields.io/badge/security-${label}-${color})](https://github.com/${REPO}/actions/workflows/security.yml)"
          PLACEHOLDER="<!-- security-badge -->"

          # Write badge snippet to step summary for first-time setup
          {
            echo ""
            echo "## Security badge"
            echo ""
            echo "Add this to your \`README.md\` to display the security scan badge:"
            echo ""
            echo '```markdown'
            echo "${PLACEHOLDER}"
            echo "${BADGE}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Only commit if the placeholder exists in README.md
          if ! grep -qF "${PLACEHOLDER}" README.md 2>/dev/null; then
            echo "No badge placeholder found in README.md — skipping badge commit."
            exit 0
          fi

          # Replace the line immediately after the placeholder
          awk -v badge="${BADGE}" -v marker="${PLACEHOLDER}" '
            $0 == marker { print; getline; print badge; next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "Badge already up to date." && exit 0
          git commit -m "chore: update security badge [skip ci]"
          git push
