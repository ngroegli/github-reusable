name: Release - reusable GitHub Release (callable)

# Called by other repositories on a tag push, e.g.:
#
#   jobs:
#     release:
#       uses: ngroegli/github-reusable/.github/workflows/release-reusable.yml@main
#       with:
#         node_version: '22'      # optional
#         python_version: '3.13'  # optional
#
# No secrets are required. GITHUB_TOKEN is injected automatically.
# Publishing to npm, PyPI, or Docker registries is NOT performed here —
# that is the responsibility of each repository's own deploy workflow.

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use when building npm packages.
        required: false
        type: string
        default: '20'
      python_version:
        description: Python version to use when building Python packages.
        required: false
        type: string
        default: '3.12'

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Detect which project types exist and extract the version tag.
  # ------------------------------------------------------------------
  detect:
    name: Detect project types and resolve version
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_node: ${{ steps.detect.outputs.is_node }}
      is_python: ${{ steps.detect.outputs.is_python }}
      is_docker: ${{ steps.detect.outputs.is_docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect project types and resolve version
        id: detect
        env:
          REF: ${{ github.ref }}
        run: |
          # Strip refs/tags/ prefix
          version="${REF#refs/tags/}"

          is_node=false
          is_python=false
          is_docker=false

          [ -f package.json ]                              && is_node=true
          { [ -f pyproject.toml ] || [ -f setup.py ]; }   && is_python=true
          [ -f Dockerfile ]                                && is_docker=true

          echo "version=$version"       >> "$GITHUB_OUTPUT"
          echo "is_node=$is_node"       >> "$GITHUB_OUTPUT"
          echo "is_python=$is_python"   >> "$GITHUB_OUTPUT"
          echo "is_docker=$is_docker"   >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Build npm package tarball (.tgz) — only when package.json exists.
  # Does NOT publish to the npm registry.
  # ------------------------------------------------------------------
  build-npm:
    name: Build npm package
    runs-on: ubuntu-24.04
    needs: detect
    if: needs.detect.outputs.is_node == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        run: npm ci

      - name: Build (if script present)
        run: |
          if npm run | grep -q " build"; then
            npm run build
          fi

      - name: Pack tarball
        run: |
          mkdir -p dist
          npm pack >/dev/null
          for f in *.tgz; do
            [ -f "$f" ] && mv "$f" dist/
          done

      - name: Upload npm artifact
        uses: actions/upload-artifact@v6
        with:
          name: npm-dist
          path: dist/*.tgz
          retention-days: 30

  # ------------------------------------------------------------------
  # Build Python wheel and source distribution — only when
  # pyproject.toml or setup.py exists.
  # Does NOT publish to PyPI.
  # ------------------------------------------------------------------
  build-python:
    name: Build Python package
    runs-on: ubuntu-24.04
    needs: detect
    if: needs.detect.outputs.is_python == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ inputs.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload Python artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/
          retention-days: 30

  # ------------------------------------------------------------------
  # Export Docker image as a compressed tar archive — only when a
  # Dockerfile exists.
  # Does NOT push to any registry.
  # ------------------------------------------------------------------
  build-docker:
    name: Build and export Docker image
    runs-on: ubuntu-24.04
    needs: detect
    if: needs.detect.outputs.is_docker == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image and export to tar
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # Use repo name (without owner) as image name
          image_name="${REPO##*/}"
          docker build -t "${image_name}:${VERSION}" .
          mkdir -p dist
          docker save "${image_name}:${VERSION}" | gzip > "dist/${image_name}-${VERSION}.tar.gz"

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-dist
          path: dist/*.tar.gz
          retention-days: 30

  # ------------------------------------------------------------------
  # GitHub Release — creates the release page and attaches all built
  # artifacts as downloadable assets.
  # ------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [detect, build-npm, build-python, build-docker]
    if: always() && needs.detect.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
        continue-on-error: true

      - name: Create GitHub Release
        # softprops/action-gh-release pinned to latest stable commit
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          tag_name: ${{ needs.detect.outputs.version }}
          generate_release_notes: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version badge in README
        # Rewrites the shields.io release badge line in README.md so the
        # badge always shows the version that was just released.
        # The badge placeholder must exist in README.md:
        #   <!-- release-badge -->
        #   ![Latest release](https://img.shields.io/github/v/release/...)
        # If the placeholder is absent the step is a no-op (no commit made).
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BADGE="[![Latest release](https://img.shields.io/github/v/release/${REPO}?label=release)](https://github.com/${REPO}/releases/latest)"
          PLACEHOLDER="<!-- release-badge -->"

          # Write badge URL to step summary regardless
          {
            echo "## Badge"
            echo ""
            echo "Add this to your \`README.md\` to display the version badge:"
            echo ""
            echo '```markdown'
            echo "${PLACEHOLDER}"
            echo "${BADGE}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Only commit if the placeholder exists in README.md
          if ! grep -qF "${PLACEHOLDER}" README.md 2>/dev/null; then
            echo "No badge placeholder found in README.md — skipping badge commit."
            exit 0
          fi

          # Replace the line immediately after the placeholder
          awk -v badge="${BADGE}" -v marker="${PLACEHOLDER}" '
            $0 == marker { print; getline; print badge; next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "Badge already up to date." && exit 0
          git commit -m "chore: update release badge to ${VERSION} [skip ci]"
          git push
